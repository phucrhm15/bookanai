# Render.com — Blueprint: Web Service (Docker) + persistent disk
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: nano-agent
    runtime: docker
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/bookanai.db
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CIRCLE_API_KEY
        sync: false
      - key: ENTITY_SECRET
        sync: false
      - key: CIRCLE_WALLET_SET_ID
        sync: false
      - key: MASTER_AGENT_PRIVATE_KEY
        sync: false
      - key: X402_DISCOVERY_URL
        value: https://api.circle.com/v2/x402/discovery/resources
      - key: SETTLEMENT_CRON_SECRET
        generateValue: true
      - key: BASE_RPC_URL
        value: https://mainnet.base.org
      - key: POLYGON_RPC_URL
        value: https://polygon.llamarpc.com
    disk:
      name: bookanai-data
      mountPath: /data
      sizeGB: 1
